<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porra Gran Final: España vs Argentina</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --accent-gold: #ffd700;
            --accent-gold-glow: rgba(255, 215, 0, 0.4);
            --spain-red: #c60b1e;
            --spain-yellow: #fac129;
            --arg-blue: #74acdf;
            --arg-white: #ffffff;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --success-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at top, rgba(16, 185, 129, 0.15), transparent 60%),
                radial-gradient(circle at bottom, rgba(21, 29, 48, 0.8), var(--bg-color));
            padding: 20px;
        }

        /* Ambient Stadium Lights Animation */
        @keyframes pulse-light {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }

        .stadium-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            height: 300px;
            background: radial-gradient(ellipse at top, rgba(255, 215, 0, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse-light 4s infinite ease-in-out;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
            position: relative;
        }

        .designer-tag {
            font-size: 0.85rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 0 10px var(--accent-gold-glow);
            display: inline-block;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 550px;
            z-index: 10;
        }

        /* Sweepstakes Card */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--spain-red), var(--spain-yellow), var(--arg-blue), var(--arg-white), var(--arg-blue));
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-name {
            width: 100%;
            background-color: rgba(11, 15, 25, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-name:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
            background-color: rgba(11, 15, 25, 0.9);
        }

        /* Matchboard */
        .matchboard {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 40%;
        }

        .flag-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }

        .flag-wrapper:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Flag Designs */
        .flag {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .flag-spain {
            background: linear-gradient(to bottom, var(--spain-red) 25%, var(--spain-yellow) 25%, var(--spain-yellow) 75%, var(--spain-red) 75%);
            position: relative;
        }

        /* Miniature Shield for Spain */
        .flag-spain::after {
            content: '🛡️';
            position: absolute;
            left: 25%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        .flag-argentina {
            background: linear-gradient(to bottom, var(--arg-blue) 33.3%, var(--arg-white) 33.3%, var(--arg-white) 66.6%, var(--arg-blue) 66.6%);
            position: relative;
            justify-content: center;
            align-items: center;
        }

        /* Sun of May */
        .flag-argentina::after {
            content: '☀️';
            font-size: 16px;
            color: #f7b32b;
            line-height: 1;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        /* Interactive Score Counter */
        .score-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .counter-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
            transform: scale(1.15);
        }

        .score-val {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 5px 0;
            min-width: 40px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .vs {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent-gold);
            opacity: 0.8;
            margin: 0 15px;
            text-shadow: 0 0 8px var(--accent-gold-glow);
        }

        /* Action Buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.5);
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: #fff;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.5);
        }

        /* Participant Results List */
        .results-section {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-badge {
            background: rgba(255,255,255,0.1);
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 20px;
            color: var(--text-light);
        }

        .results-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .results-list::-webkit-scrollbar {
            width: 6px;
        }
        .results-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .results-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .result-user {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-scores {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .res-spain {
            color: var(--spain-yellow);
        }
        .res-arg {
            color: var(--arg-blue);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer styling */
        footer {
            margin-top: auto;
            padding: 30px 10px 10px 10px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="stadium-glow"></div>

    <header>
        <div class="designer-tag">Diseño.- Ginés Ros</div>
        <h1>🏆 Porra Gran Final 🏆</h1>
        <div class="subtitle">España 🇪🇸 vs Argentina 🇦🇷</div>
    </header>

    <main class="container">
        <div class="card">
            
            <div class="form-group">
                <label for="participant-name">Tu Nombre / Apodo</label>
                <input type="text" id="participant-name" class="input-name" placeholder="Ej. Pepito, Juanito..." required autocomplete="off">
            </div>

            <!-- Scoreboard Area -->
            <div class="matchboard">
                <!-- Spain -->
                <div class="team">
                    <div class="flag-wrapper">
                        <div class="flag flag-spain"></div>
                    </div>
                    <div class="team-name">España</div>
                    <div class="score-selector">
                        <button class="counter-btn" onclick="changeScore('spain', 1)">+</button>
                        <span class="score-val" id="score-spain">0</span>
                        <button class="counter-btn" onclick="changeScore('spain', -1)">-</button>
                    </div>
                </div>

                <div class="vs">VS</div>

                <!-- Argentina -->
                <div class="team">
                    <div class="flag-wrapper">
                        <div class="flag flag-argentina"></div>
                    </div>
                    <div class="team-name">Argentina</div>
                    <div class="score-selector">
                        <button class="counter-btn" onclick="changeScore('arg', 1)">+</button>
                        <span class="score-val" id="score-arg">0</span>
                        <button class="counter-btn" onclick="changeScore('arg', -1)">-</button>
                    </div>
                </div>
            </div>

            <!-- Interaction triggers -->
            <div class="actions">
                <button class="btn btn-primary" onclick="savePrediction()">
                    💾 Registrar Pronóstico
                </button>
                <button class="btn btn-whatsapp" onclick="shareWhatsApp()">
                    💬 Compartir en WhatsApp
                </button>
            </div>

            <!-- Live Bets List -->
            <div class="results-section">
                <div class="section-title">
                    <span>Pronósticos Registrados</span>
                    <span class="count-badge" id="bets-count">0</span>
                </div>
                <ul class="results-list" id="results-list">
                    <!-- Dynamic entries will load here -->
                </ul>
            </div>

        </div>
    </main>

    <footer>
        <p>© 2026 - Diseñado con pasión futbolera por Ginés Ros</p>
    </footer>

    <script>
        // Google Apps Script Web App URL
        const URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbyWFcQavt_DBVDsR7TQOqAvdDTxcGewa91-0QH9pF8tifTztfC7kH1pFNHa3miQgtYi-w/exec";

        // Track match scores
        let scores = {
            spain: 0,
            arg: 0
        };

        // Render List from Google Sheets
        async function renderPredictions() {
            const listElement = document.getElementById('results-list');
            const countElement = document.getElementById('bets-count');
            
            listElement.innerHTML = '<li class="result-item" style="justify-content: center; opacity: 0.7;">Cargando apuestas... ⚽</li>';

            try {
                const response = await fetch(URL_GOOGLE_SCRIPT);
                const predictionsArray = await response.json();

                listElement.innerHTML = '';
                
                if (!predictionsArray || predictionsArray.length === 0) {
                    listElement.innerHTML = '<li class="result-item" style="justify-content: center; opacity: 0.7;">Aún no hay apuestas. ¡Sé el primero!</li>';
                    countElement.textContent = "0";
                    return;
                }

                // Render in reverse to show latest on top
                predictionsArray.reverse().forEach(p => {
                    const li = document.createElement('li');
                    li.className = 'result-item';
                    li.innerHTML = `
                        <div class="result-user">⚽ ${escapeHTML(p.name)}</div>
                        <div class="result-scores">
                            <span class="res-spain">${p.spain}</span>
                            <span>-</span>
                            <span class="res-arg">${p.arg}</span>
                        </div>
                    `;
                    listElement.appendChild(li);
                });
                
                countElement.textContent = predictionsArray.length;

            } catch (error) {
                console.error("Error al cargar apuestas:", error);
                listElement.innerHTML = '<li class="result-item" style="justify-content: center; opacity: 0.7; color: #ef4444;">No se pudieron cargar las apuestas</li>';
            }
        }

        // Helper to escape special HTML chars
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Change Scores
        function changeScore(team, amount) {
            scores[team] = Math.max(0, scores[team] + amount);
            document.getElementById(`score-${team}`).textContent = scores[team];
        }

        // Save prediction to Google Sheets
        async function savePrediction() {
            const nameInput = document.getElementById('participant-name');
            const name = nameInput.value.trim();

            if (!name) {
                alert("Por favor, introduce tu nombre antes de registrar.");
                nameInput.focus();
                return;
            }

            const newBet = {
                name: name,
                spain: scores.spain,
                arg: scores.arg
            };

            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = "💾 Registrando apuesta...";

            try {
                // Send data using POST (using no-cors as safety to avoid browser redirects/blocks)
                await fetch(URL_GOOGLE_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newBet)
                });

                alert("¡Tu pronóstico ha sido enviado con éxito! 🎉");
                nameInput.value = '';
                
                // Refresh predictions list in 1.5 seconds to let sheet update
                setTimeout(renderPredictions, 1500);

            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Hubo un error de conexión al enviar la porra. Inténtalo de nuevo.");
            } finally {
                btn.disabled = false;
                btn.textContent = "💾 Registrar Pronóstico";
            }
        }

        // Share to WhatsApp Group Chat
        function shareWhatsApp() {
            const name = document.getElementById('participant-name').value.trim() || "Un invitado";
            const spainScore = scores.spain;
            const argScore = scores.arg;

            const text = `🏆 *PORRA GRAN FINAL MUNDIAL* 🏆%0A%0A` +
                         `⚽ *${name}* ha dejado su pronóstico:%0A` +
                         `🇪🇸 España *${spainScore}* - *${argScore}* Argentina 🇦🇷%0A%0A` +
                         `👉 ¡Participa tú también aquí! Link: ` + window.location.href;

            const whatsappUrl = `https://api.whatsapp.com/send?text=${text}`;
            window.open(whatsappUrl, '_blank');
        }

        // Initial Load
        window.onload = renderPredictions;
    </script>
</body>
</html>
